<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>People in Orbit — viewer</title>
<style>
  html,body { margin:0; height:100%; background:#eef1f4; overflow:hidden;
    font:13px/1.4 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  #app { position:fixed; inset:0; }
  #err { position:fixed; bottom:14px; left:14px; right:14px; color:#c0392b;
    font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
  .lil-gui { --width:248px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { STLLoader } from "three/addons/loaders/STLLoader.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import { GUI } from "three/addons/libs/lil-gui.module.min.js";

const errEl = document.getElementById("err");
const fail = m => { errEl.textContent = m; console.error(m); };

const app = document.getElementById("app");
const scene = new THREE.Scene(); scene.background = new THREE.Color(0xeef1f4);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 500000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping; app.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;

const amb  = new THREE.AmbientLight(0xffffff, 0.85); scene.add(amb);
const hemi = new THREE.HemisphereLight(0xffffff, 0xbac4d0, 0.7); scene.add(hemi);
const d1 = new THREE.DirectionalLight(0xffffff, 0.6); d1.position.set(1,2,1); scene.add(d1);
const d2 = new THREE.DirectionalLight(0xdfe8ff, 0.3); d2.position.set(-1,-0.5,-1); scene.add(d2);

const root = new THREE.Group(); root.rotation.x = -Math.PI/2; scene.add(root); // Z-up -> Y-up
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.6, 0.7, 0.0);
composer.addPass(bloom); composer.addPass(new OutputPass());

const loader = new STLLoader();
const toggles = []; let home = null, gui = null; const layerProxy = {};
const EXPLODE = { neon:-1.0, bracket:0.6, steel:1.4, host:0, column:0, grid:0 };

const VIEWS = {
  "canopy": "out/canopy.manifest.json",
  "mounting detail": "out/detail.manifest.json",
  "mounting options": "out/options.manifest.json",
};
const params = {
  view:"canopy", mode:"plan", explode:0, seat:1.0,   // seat = neon proud (flush ~1 mm)
  bloom:1.6, glow:2.4,
  hostColor:"#c8ced6", roughness:0.55, metalness:0.0,
};
const PRESET = {
  plan: { bg:0xeef1f4, amb:0.85, hemi:0.7, d1:0.6, d2:0.3, host:"#c8ced6", rough:0.55, exposure:1.2 },
  live: { bg:0x060708, amb:0.22, hemi:0.12, d1:0.18, d2:0.10, host:"#0d0f13", rough:0.25, exposure:1.0 },
};

function material(p) {
  const col = new THREE.Color(p.color);
  if (p.kind === "neon") return new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:0.55, roughness:0.45 });
  if (p.kind === "host") return new THREE.MeshStandardMaterial({ color:new THREE.Color(params.hostColor), metalness:params.metalness, roughness:params.roughness });
  return new THREE.MeshStandardMaterial({ color:col, metalness:0.8, roughness:0.4 });   // bracket / steel / column
}
function addPart(p, geo) {
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, material(p)); root.add(mesh);
  toggles.push({ mesh, name:p.name, color:p.color, kind:p.kind });
}
function fit() {
  const b = new THREE.Box3().setFromObject(root);
  const c = b.getCenter(new THREE.Vector3()), s = b.getSize(new THREE.Vector3()).length();
  controls.target.copy(c);
  home = { pos:new THREE.Vector3(c.x + s*0.12, c.y - s*0.8, c.z + s*0.22), tgt:c.clone(), s };
  camera.position.copy(home.pos); camera.near = s/500; camera.far = s*50; camera.updateProjectionMatrix();
}

// --- live tweaks ---
function layout() { for (const t of toggles) { let z = (EXPLODE[t.kind] ?? 0) * params.explode; if (t.kind==="neon") z -= params.seat; t.mesh.position.z = z; } }
function applyHost() { for (const t of toggles) if (t.kind==="host") { t.mesh.material.color.set(params.hostColor); t.mesh.material.roughness = params.roughness; t.mesh.material.metalness = params.metalness; } }
function applyGlow() { for (const t of toggles) if (t.kind==="neon") t.mesh.material.emissiveIntensity = params.mode==="live" ? params.glow : 0.55; bloom.strength = params.bloom; }
function applyMode() {
  const live = params.mode==="live", P = PRESET[params.mode];
  scene.background.set(P.bg); amb.intensity=P.amb; hemi.intensity=P.hemi; d1.intensity=P.d1; d2.intensity=P.d2;
  renderer.toneMappingExposure = P.exposure; params.hostColor=P.host; params.roughness=P.rough;
  applyHost(); applyGlow();
  for (const t of toggles) if (t.kind==="grid"||t.kind==="steel") { t.mesh.visible=!live; layerProxy[t.name]=!live; if (t.ctrl) t.ctrl.updateDisplay(); }
  if (gui) gui.controllersRecursive().forEach(c => c.updateDisplay());
}

function buildGUI() {
  gui = new GUI({ title:"People in Orbit" });
  gui.add(params,"view",Object.keys(VIEWS)).name("View").onChange(loadView);
  gui.add(params,"mode",["plan","live"]).name("Mode").onChange(applyMode);
  gui.add(params,"explode",0,150,1).name("Explode").onChange(layout);
  const g = gui.addFolder("Glow");
  g.add(params,"bloom",0,3,0.05).name("Bloom").onChange(() => bloom.strength = params.bloom);
  g.add(params,"glow",0,5,0.1).name("Neon glow").onChange(applyGlow);
  const s = gui.addFolder("Surface");
  s.addColor(params,"hostColor").name("Host colour").onChange(applyHost);
  s.add(params,"roughness",0,1,0.01).name("Roughness").onChange(applyHost);
  s.add(params,"metalness",0,1,0.01).name("Metalness").onChange(applyHost);
  const n = gui.addFolder("Neon");
  n.add(params,"seat",-2,20,0.1).name("Seat / flush (mm)").onChange(layout);
  const L = gui.addFolder("Layers");
  for (const t of toggles) { layerProxy[t.name] = t.mesh.visible; t.ctrl = L.add(layerProxy, t.name).onChange(v => t.mesh.visible = v); }
  const cam = gui.addFolder("Camera");
  cam.add({ f:()=>{ if(home) camera.position.set(home.tgt.x, home.tgt.y-home.s*0.95, home.tgt.z+home.s*0.02); } },"f").name("From below");
  cam.add({ f:()=>{ if(home){ camera.position.copy(home.pos); controls.target.copy(home.tgt);} params.explode=0; layout(); gui.controllersRecursive().forEach(c=>c.updateDisplay()); } },"f").name("Reset view");
}

// --- 2D layout overlay (matrix grid + columns + fixings) ---
async function addGrid() {
  const d = await fetch("ceiling.json").then(r => r.ok ? r.json() : null).catch(() => null);
  if (!d) return;
  const z = -1, cs = d.cell_mm;
  const grp = new THREE.Group(); root.add(grp);
  const seg = [];
  for (const [x,y] of d.cells) { const h=cs/2, c=[[x-h,y-h],[x+h,y-h],[x+h,y+h],[x-h,y+h]];
    for (let i=0;i<4;i++){ const a=c[i], b=c[(i+1)%4]; seg.push(a[0],a[1],z, b[0],b[1],z); } }
  const gg = new THREE.BufferGeometry(); gg.setAttribute("position", new THREE.Float32BufferAttribute(seg,3));
  grp.add(new THREE.LineSegments(gg, new THREE.LineBasicMaterial({ color:0x8a99aa })));
  for (const col of d.columns) { const cp=[]; for (let i=0;i<=64;i++){ const a=i/64*Math.PI*2; cp.push(col.c[0]+col.r*Math.cos(a), col.c[1]+col.r*Math.sin(a), z); }
    const cg=new THREE.BufferGeometry(); cg.setAttribute("position", new THREE.Float32BufferAttribute(cp,3));
    grp.add(new THREE.Line(cg, new THREE.LineBasicMaterial({ color:0x39c97a }))); }
  toggles.push({ mesh:grp, name:"matrix (existing → remove)", color:"#8a99aa", kind:"grid" });

  let minx=1e9, miny=1e9; for (const [x,y] of d.cells){ minx=Math.min(minx,x); miny=Math.min(miny,y); }
  const fix = new THREE.Group(); root.add(fix);
  for (const [x,y] of d.cells) { const ix=Math.round((x-minx)/cs), iy=Math.round((y-miny)/cs); if (ix%2||iy%2) continue;
    const fp=[]; for (let i=0;i<=20;i++){ const a=i/20*Math.PI*2; fp.push(x+45*Math.cos(a), y+45*Math.sin(a), z); }
    const fg=new THREE.BufferGeometry(); fg.setAttribute("position", new THREE.Float32BufferAttribute(fp,3));
    fix.add(new THREE.Line(fg, new THREE.LineBasicMaterial({ color:0xff7a1a }))); }
  toggles.push({ mesh:fix, name:"fixings (~1 m)", color:"#ff7a1a", kind:"grid" });
}

async function loadView() {
  errEl.textContent = "";
  for (const t of toggles) { root.remove(t.mesh); t.mesh.geometry?.dispose?.(); }   // clear current
  toggles.length = 0; for (const k in layerProxy) delete layerProxy[k];
  if (gui) { gui.destroy(); gui = null; }
  const url = VIEWS[params.view] || "out/manifest.json";
  const m = await fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
  if (!m) { buildGUI(); return fail("missing " + url + " — run the matching script (figure.py / detail.py / options.py)"); }
  for (const p of m) { try { addPart(p, await loader.loadAsync("out/"+p.file)); } catch(e){ fail("load out/"+p.file+" — "+e); } }
  if (params.view === "canopy") await addGrid();    // the ceiling layout only makes sense for the canopy
  buildGUI(); applyMode(); layout(); fit();
}
loadView();

addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);
});
(function loop(){ requestAnimationFrame(loop); controls.update();
  if (params.mode==="live") composer.render(); else renderer.render(scene, camera); })();
</script>
</body>
</html>
