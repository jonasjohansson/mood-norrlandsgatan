<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>People in Orbit — preview</title>
<style>
  :root { --panel:#ffffff; --ink:#1b2027; --muted:#5b6470; --line:#d6dce3; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#eef1f4; color:var(--ink);
    font:13px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  #app { position:fixed; inset:0; }
  #ui { position:fixed; top:14px; left:14px; width:240px; background:rgba(255,255,255,.92);
    border:1px solid var(--line); border-radius:12px; padding:14px;
    box-shadow:0 8px 24px rgba(30,40,60,.12); }
  h1 { font-size:13px; margin:0 0 2px; } .sub { color:var(--muted); margin:0 0 12px; font-size:11px; }
  .row { display:flex; align-items:center; gap:8px; padding:3px 0; }
  .row label { flex:1; cursor:pointer; user-select:none; }
  .sw { width:11px; height:11px; border-radius:3px; flex:none; border:1px solid rgba(0,0,0,.15); }
  .ctl { margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
  .ctl label { display:block; color:var(--muted); font-size:11px; margin-bottom:4px; }
  input[type=range] { width:100%; accent-color:#ff7a1a; }
  .btns { display:flex; gap:6px; margin-top:10px; }
  button { flex:1; background:#f1f4f8; color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:6px; cursor:pointer; font:inherit; } button:hover { border-color:#aab4c0; }
  #err { position:fixed; bottom:14px; left:14px; right:14px; color:#c0392b;
    font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
</style>
</head>
<body>
<div id="app"></div>
<div id="ui">
  <h1>People in Orbit</h1>
  <p class="sub">snap-groove host · FN-ESJT-B1023 neon · steel</p>
  <div id="parts"></div>
  <div class="ctl">
    <label>Explode <span id="expv">0</span></label>
    <input id="explode" type="range" min="0" max="120" value="0">
    <div class="btns">
      <button id="below">From below</button>
      <button id="reset">Reset</button>
    </div>
  </div>
</div>
<div id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { STLLoader } from "three/addons/loaders/STLLoader.js";

const errEl = document.getElementById("err");
const fail = (m) => { errEl.textContent = m; console.error(m); };

const app = document.getElementById("app");
const scene = new THREE.Scene(); scene.background = new THREE.Color(0xeef1f4);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 500000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
scene.add(new THREE.AmbientLight(0xffffff, 0.85));
scene.add(new THREE.HemisphereLight(0xffffff, 0xbac4d0, 0.7));
const d1 = new THREE.DirectionalLight(0xffffff, 0.6); d1.position.set(1,2,1); scene.add(d1);
const d2 = new THREE.DirectionalLight(0xdfe8ff, 0.3); d2.position.set(-1,-0.5,-1); scene.add(d2);

const root = new THREE.Group(); root.rotation.x = -Math.PI/2; scene.add(root); // Z-up -> Y-up

const loader = new STLLoader();
const toggles = [];     // { mesh, name, color, kind, baseZ }
let home = null;

// how far each kind moves when exploding (× slider)
const EXPLODE = { neon:-1.0, bracket:0.6, steel:1.4, host:0 };

function material(p) {
  const col = new THREE.Color(p.color);
  if (p.kind === "neon")
    return new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:0.55, roughness:0.45 });
  if (p.kind === "host")
    return new THREE.MeshStandardMaterial({ color:col, metalness:0.0, roughness:0.55 });
  return new THREE.MeshStandardMaterial({ color:col, metalness:0.8, roughness:0.4 }); // bracket / steel
}

function addPart(p, geo) {
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, material(p));
  root.add(mesh);
  toggles.push({ mesh, name:p.name, color:p.color, kind:p.kind, baseZ:0 });
}

function buildUI() {
  const box = document.getElementById("parts"); box.innerHTML = "";
  for (const t of toggles) {
    const row = document.createElement("div"); row.className = "row";
    const cb = document.createElement("input"); cb.type="checkbox"; cb.checked=true;
    cb.onchange = () => t.mesh.visible = cb.checked;
    const sw = document.createElement("span"); sw.className="sw"; sw.style.background=t.color;
    const lb = document.createElement("label"); lb.textContent=t.name;
    lb.onclick = () => { cb.checked=!cb.checked; t.mesh.visible=cb.checked; };
    row.append(cb, sw, lb); box.appendChild(row);
  }
}

function fit() {
  const b = new THREE.Box3().setFromObject(root);
  const c = b.getCenter(new THREE.Vector3()), s = b.getSize(new THREE.Vector3()).length();
  controls.target.copy(c);
  home = { pos:new THREE.Vector3(c.x + s*0.3, c.y - s*0.5, c.z + s*0.6), tgt:c.clone(), s };
  camera.position.copy(home.pos);
  camera.near = s/500; camera.far = s*50; camera.updateProjectionMatrix();
}

fetch("out/manifest.json")
  .then(r => r.ok ? r.json() : Promise.reject("no out/manifest.json — run: uv run python detail.py (or figure.py)"))
  .then(async (m) => {
    for (const p of m) { try { addPart(p, await loader.loadAsync("out/"+p.file)); }
                         catch(e){ fail("load out/"+p.file+" — "+e); } }
    buildUI(); fit();
  }).catch(fail);

const $ = id => document.getElementById(id);
$("explode").oninput = e => {
  const v = +e.target.value; $("expv").textContent = v;
  for (const t of toggles) t.mesh.position.z = (EXPLODE[t.kind] ?? 0) * v;
};
$("below").onclick = () => { if(home) camera.position.set(home.tgt.x, home.tgt.y - home.s*0.05, home.tgt.z + home.s*0.95); };
$("reset").onclick = () => { if(home){ camera.position.copy(home.pos); controls.target.copy(home.tgt);} $("explode").value=0; $("explode").dispatchEvent(new Event("input")); };

addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
</script>
</body>
</html>
