<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>People in Orbit — viewer</title>
<style>
  html,body { margin:0; height:100%; background:#eef1f4; overflow:hidden;
    font:13px/1.4 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  #app { position:fixed; inset:0; }
  #err { position:fixed; bottom:14px; left:14px; right:14px; color:#c0392b;
    font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
  .lil-gui { --width:248px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";
import { STLLoader } from "three/addons/loaders/STLLoader.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import { GTAOPass } from "three/addons/postprocessing/GTAOPass.js";
import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
import { Reflector } from "three/addons/objects/Reflector.js";
import { RGBELoader } from "three/addons/loaders/RGBELoader.js";
import { GUI } from "three/addons/libs/lil-gui.module.min.js";

const errEl = document.getElementById("err");
const fail = m => { errEl.textContent = m; console.error(m); };

const app = document.getElementById("app");
const scene = new THREE.Scene(); const bgColor = new THREE.Color(0xeef1f4); scene.background = bgColor;
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 500000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping; app.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;

// --- first-person walk / fly camera (toggle in the Camera folder) ---
const fpc = new PointerLockControls(camera, renderer.domElement);
const keys = {}; const wclock = new THREE.Clock();
let camMode = "orbit", fly = false;
addEventListener("keydown", e => {
  if (camMode !== "walk" || !fpc.isLocked) return;
  if (e.code === "KeyF") { fly = !fly; updateInfo?.(); showWalkHint(); }
  keys[e.code] = true;
});
addEventListener("keyup", e => { keys[e.code] = false; });
renderer.domElement.addEventListener("click", () => { if (camMode === "walk") fpc.lock(); });
const hint = document.createElement("div");
hint.style.cssText = "position:fixed;left:50%;top:16px;transform:translateX(-50%);z-index:20;color:#dfe6ef;background:rgba(10,14,22,.72);padding:7px 13px;border-radius:7px;font:12px/1.3 ui-monospace,monospace;pointer-events:none;display:none;text-align:center";
document.body.appendChild(hint);
function showWalkHint() {
  hint.innerHTML = fpc.isLocked
    ? `WASD move · mouse look · <b>F</b> fly ${fly ? "ON" : "off"}${fly ? " · E up · Q down" : ""} · Esc release`
    : "Click to walk · WASD move · mouse look · F fly · Esc release";
  hint.style.display = (camMode === "walk") ? "block" : "none";
}
fpc.addEventListener("lock", showWalkHint); fpc.addEventListener("unlock", showWalkHint);
function setCamMode(m) {
  camMode = m;
  if (m === "walk") {
    controls.enabled = false;
    const t = home ? home.tgt : new THREE.Vector3();
    camera.position.set(t.x, FLOOR_Y + 1650, t.z + 9000);   // stand on the ground
    camera.lookAt(t.x, FLOOR_Y + 4000, t.z);
  } else { fpc.unlock(); controls.enabled = true; }
  showWalkHint();
}
function updateWalk(dt) {
  if (camMode !== "walk" || !fpc.isLocked) return;
  const sp = (keys["ShiftLeft"] || keys["ShiftRight"] ? 14000 : 5000) * dt;
  if (keys["KeyW"]) fpc.moveForward(sp);
  if (keys["KeyS"]) fpc.moveForward(-sp);
  if (keys["KeyA"]) fpc.moveRight(-sp);
  if (keys["KeyD"]) fpc.moveRight(sp);
  if (fly) {
    if (keys["KeyE"]) camera.position.y += sp;
    if (keys["KeyQ"]) camera.position.y -= sp;
  } else {
    camera.position.y = FLOOR_Y + 1650;   // walking: locked to eye height
  }
}

const amb  = new THREE.AmbientLight(0xffffff, 0.85); scene.add(amb);
const hemi = new THREE.HemisphereLight(0xfff2e2, 0x3a322b, 0.7); scene.add(hemi);   // warm, neutral ground
const d1 = new THREE.DirectionalLight(0xffffff, 0.6); d1.position.set(9000,26000,7000); scene.add(d1);
const d2 = new THREE.DirectionalLight(0xffe6cc, 0.3); d2.position.set(-1,-0.5,-1); scene.add(d2);   // warm fill (no blue cast)

// soft grounding shadows from the key light
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
d1.castShadow = true; d1.shadow.mapSize.set(2048,2048);
d1.shadow.camera.near = 1000; d1.shadow.camera.far = 90000;
d1.shadow.camera.left = -22000; d1.shadow.camera.right = 22000;
d1.shadow.camera.top = 22000; d1.shadow.camera.bottom = -22000;
d1.shadow.bias = -0.0004; d1.shadow.normalBias = 40;
scene.add(d1.target); d1.target.position.set(0, 5000, 0);

const root = new THREE.Group(); root.rotation.x = -Math.PI/2; scene.add(root); // Z-up -> Y-up
const rt = new THREE.WebGLRenderTarget(innerWidth, innerHeight, { type: THREE.HalfFloatType, samples: 4 });  // MSAA
const composer = new EffectComposer(renderer, rt);
composer.addPass(new RenderPass(scene, camera));
const gtao = new GTAOPass(scene, camera, innerWidth, innerHeight);   // ambient occlusion (contact depth)
gtao.output = GTAOPass.OUTPUT.Default;
gtao.updateGtaoMaterial({ radius:0.35, distanceExponent:1, thickness:1, scale:1.2, samples:16, distanceFallOff:1, screenSpaceRadius:true });
composer.addPass(gtao);
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.45, 0.05);
composer.addPass(bloom); composer.addPass(new OutputPass());

// realistic environment lighting (soft reflections + ambient on every surface)
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;   // fallback until HDRI loads
let hdrTex = null;
// (no fog — it muddied the scene)
new RGBELoader().load("assets/night_2k.hdr", tex => {
  tex.mapping = THREE.EquirectangularReflectionMapping; hdrTex = tex;
  scene.environment = pmrem.fromEquirectangular(tex).texture;               // realistic night reflections
  if (typeof applyMode === "function") applyMode();
});

// matte floor ~3 m below the soffit (the street/pavement)
let FLOOR_Y = -3000;   // updated to the building base once it loads
const floor = new THREE.Mesh(new THREE.PlaneGeometry(60000, 60000),
  new THREE.MeshStandardMaterial({ color:0x0a0c10, roughness:0.95, metalness:0.0, envMapIntensity:0.15 }));  // don't pick up the blue HDRI
floor.rotation.x = -Math.PI/2; floor.position.y = FLOOR_Y; floor.receiveShadow = true; scene.add(floor);

// dusk sky gradient (deep blue overhead -> warm horizon), the target vibe
function makeDuskSky() {
  const c = document.createElement("canvas"); c.width = 8; c.height = 256;
  const x = c.getContext("2d"); const g = x.createLinearGradient(0,0,0,256);
  g.addColorStop(0,"#0d1630"); g.addColorStop(0.55,"#2a3a60"); g.addColorStop(0.82,"#5b5f86"); g.addColorStop(1,"#8c7a90");
  x.fillStyle = g; x.fillRect(0,0,8,256);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}
const duskSky = makeDuskSky();
// colored spill from the neon onto the pillars/floor (decay 0 = predictable tint)

const loader = new STLLoader();
const toggles = []; let home = null, gui = null; const layerProxy = {};
const EXPLODE = { neon:-1.0, bracket:0.6, steel:1.4, host:0, column:0, grid:0, building:0 };
const gltf = new GLTFLoader();

const VIEWS = {
  "canopy": "out/canopy.manifest.json",
  "mounting options": "out/options.manifest.json",   // A/B/C method comparison
};
// candidate panel materials (appearance + the specs that matter)
const MATERIALS = {
  "Phenolic gloss (Trespa/Fundermax)": { color:"#1b1f24", roughness:0.12, metalness:0.0, cc:1.0, ccr:0.05,
    cnc:"yes — abrasive (carbide + dust)", weather:"exterior ✓", fire:"B-s2,d0 / A2 ✓", cost:"~37–57k kr", note:"best all-round — recommended" },
  "Solid surface (HIMACS ext.)": { color:"#e9ebee", roughness:0.25, metalness:0.0, cc:0.6, ccr:0.10,
    cnc:"yes — easiest, polishable", weather:"grade-dependent", fire:"B / A2", cost:"~110–180k kr", note:"premium; heavy + pricey" },
  "Aluminium (anodised)": { color:"#b9c0c7", roughness:0.35, metalness:1.0, cc:0.0, ccr:0.2,
    cnc:"hard on handheld Shaper", weather:"✓", fire:"A1 ✓", cost:"~70–110k kr", note:"heavy; slow to rout" },
  "PVC foam (UV)": { color:"#23272d", roughness:0.7, metalness:0.0, cc:0.0, ccr:0.3,
    cnc:"yes — cuts easily (watch melt)", weather:"ok — chalks", fire:"B self-ext.", cost:"~16–27k kr", note:"cheap; weak gloss/UV" },
  "Acrylic (cast)": { color:"#0e1216", roughness:0.05, metalness:0.0, cc:1.0, ccr:0.03,
    cnc:"risky — chips/cracks/melts", weather:"UV ✓", fire:"✗ flammable", cost:"~30–60k kr", note:"best gloss BUT fails fire" },
};
// candidate neon-flex profiles (specs)
const PROFILES = {
  "FN-ESJT-B0612 6×12 COB": { w:6,  h:12, bend:90,  ip:"IP65+ (confirm)", price:"$1.5/m", note:"recommended" },
  "FN-ESJT-B0616 6×16":     { w:6,  h:16, bend:90,  ip:"IP65+",           price:"$1.5/m", note:"taller dome" },
  "FN-ESJT-B1023 10×23":    { w:10, h:23, bend:150, ip:"IP65+",           price:"$2.8/m", note:"stiffer bend" },
  "Round φ13 270°":         { w:13, h:13, bend:60,  ip:"IP67",            price:"~$2/m",  note:"bends any dir, all-round" },
};
const params = {
  view:"canopy", mode:"plan", explode:0, seat:250,   // seat = neon hang below soffit (mm) at building scale
  material:"Phenolic gloss (Trespa/Fundermax)", hostColor:"#1b1f24", roughness:0.12, metalness:0.0,
  profile:"FN-ESJT-B0612 6×12 COB", neonColor:"#ff7a1a",
  bloom:0.4, glow:1.5, floor:true, sky:false, ao:true,   // HDRI lights the scene; background stays clean dark
  bX:0, bY:0, bZ:0, bRot:0, bScale:1.0,        // building at real scale; canopy is registered to it
  infoCNC:"", infoWeather:"", infoFire:"", infoCost:"", infoNote:"", infoProf:"",
};
const PRESET = {
  plan: { bg:0xeef1f4, amb:0.85, hemi:0.7,  d1:0.6,  d2:0.3,  exposure:1.2, env:0.9 },
  live: { bg:0x060709, amb:0.30, hemi:0.35, d1:0.40, d2:0.22, exposure:1.1, env:0.35 },  // dusk: building reads, neon glows
};

function material(p) {
  const col = new THREE.Color(p.color);
  if (p.kind === "neon") return new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:0.55, roughness:0.45 });
  if (p.kind === "host") return new THREE.MeshPhysicalMaterial({ color:new THREE.Color(params.hostColor), metalness:params.metalness, roughness:params.roughness, clearcoat:1.0, clearcoatRoughness:0.06 });
  return new THREE.MeshStandardMaterial({ color:col, metalness:0.8, roughness:0.4 });   // bracket / steel / column
}
function addPart(p, geo) {
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, material(p)); root.add(mesh);
  mesh.castShadow = p.kind !== "neon"; mesh.receiveShadow = true;
  toggles.push({ mesh, name:p.name, color:p.color, kind:p.kind });
}
function fit() {
  const b = new THREE.Box3();
  root.children.forEach(o => { if (o !== bldg) b.expandByObject(o); });   // frame the art, not the huge building
  const c = b.getCenter(new THREE.Vector3()), s = b.getSize(new THREE.Vector3()).length();
  const eye = FLOOR_Y + 1600;                        // standing on the floor, eye height, looking up
  const tgt = new THREE.Vector3(c.x, c.y, c.z);
  controls.target.copy(tgt);
  home = { pos:new THREE.Vector3(c.x + s*0.1, eye, c.z + s*1.05), tgt, s };   // stand back on the street, look up
  camera.position.copy(home.pos); camera.near = 10; camera.far = 200000; camera.updateProjectionMatrix();
}

// --- live tweaks ---
function layout() { for (const t of toggles) { let z = (EXPLODE[t.kind] ?? 0) * params.explode; if (t.kind==="neon") z -= params.seat; t.mesh.position.z = z; } }
function applyHost() { for (const t of toggles) if (t.kind==="host") { const m=t.mesh.material; m.color.set(params.hostColor); m.roughness=params.roughness; m.metalness=params.metalness; } }
function applyMaterial() { const M = MATERIALS[params.material];
  params.hostColor=M.color; params.roughness=M.roughness; params.metalness=M.metalness;
  for (const t of toggles) if (t.kind==="host") { const m=t.mesh.material; m.color.set(M.color); m.roughness=M.roughness; m.metalness=M.metalness; if ("clearcoat" in m){ m.clearcoat=M.cc; m.clearcoatRoughness=M.ccr; } }
  params.infoCNC=M.cnc; params.infoWeather=M.weather; params.infoFire=M.fire; params.infoCost=M.cost; params.infoNote=M.note; updateInfo(); }
function applyProfile() { const P = PROFILES[params.profile];
  params.infoProf = `${P.w}×${P.h} mm · bend ≥${P.bend} mm · ${P.ip} · ${P.price}`; updateInfo(); }
function applyNeonColor() { for (const t of toggles) if (t.kind==="neon") { t.mesh.material.color.set(params.neonColor); t.mesh.material.emissive.set(params.neonColor); } }
function updateInfo() { if (gui) gui.controllersRecursive().forEach(c => c.updateDisplay()); }
function applyGlow() { for (const t of toggles) if (t.kind==="neon") t.mesh.material.emissiveIntensity = params.mode==="live" ? params.glow : 0.55; bloom.strength = params.bloom; }
function applyMode() {
  const live = params.mode==="live", P = PRESET[params.mode];
  bgColor.set(P.bg);
  scene.background = (live && params.sky && hdrTex) ? hdrTex : (live ? duskSky : bgColor);   // dusk gradient sky
  scene.backgroundBlurriness = 0;   // sharp sky
  scene.backgroundIntensity = (live && params.sky) ? 0.1 : 1.0;
  amb.intensity=P.amb; hemi.intensity=P.hemi; d1.intensity=P.d1; d2.intensity=P.d2;
  renderer.toneMappingExposure = P.exposure; scene.environmentIntensity = P.env;
  bldMat.color.set(live ? 0x14181f : 0xc8ced6); bldMat.roughness = live ? 0.88 : 0.7;  // matte soffit (no HDRI smear)
  if (floor) floor.material.color.set(live ? 0x0c0b0a : 0x9aa3ad);                      // neutral dark pavement
  applyGlow();
  for (const t of toggles) if (t.kind==="grid"||t.kind==="steel"||t.kind==="bracket") { t.mesh.visible=!live; layerProxy[t.name]=!live; if (t.ctrl) t.ctrl.updateDisplay(); }
  if (gui) gui.controllersRecursive().forEach(c => c.updateDisplay());
}

function buildGUI() {
  gui = new GUI({ title:"People in Orbit — testbed" });
  gui.add(params,"view",Object.keys(VIEWS)).name("View (mounting)").onChange(loadView);
  gui.add(params,"mode",["plan","live"]).name("Mode").onChange(applyMode);
  gui.add(params,"explode",0,150,1).name("Explode").onChange(layout);

  const fM = gui.addFolder("Material");
  fM.add(params,"material",Object.keys(MATERIALS)).name("Panel").onChange(applyMaterial);
  fM.addColor(params,"hostColor").name("Colour").onChange(applyHost);
  fM.add(params,"roughness",0,1,0.01).name("Roughness").onChange(applyHost);
  fM.add(params,"metalness",0,1,0.01).name("Metalness").onChange(applyHost);

  const fN = gui.addFolder("Neon");
  fN.add(params,"profile",Object.keys(PROFILES)).name("Profile").onChange(applyProfile);
  fN.addColor(params,"neonColor").name("Colour").onChange(applyNeonColor);
  fN.add(params,"seat",-50,800,5).name("Hang below soffit (mm)").onChange(layout);
  fN.add(params,"glow",0,5,0.1).name("Glow").onChange(applyGlow);

  const fS = gui.addFolder("Scene");
  fS.add(params,"bloom",0,3,0.05).name("Bloom (live)").onChange(() => bloom.strength = params.bloom);
  fS.add(params,"floor").name("Floor").onChange(v => { if (floor) floor.visible = v; });
  fS.add(params,"sky").name("Night sky (HDRI)").onChange(applyMode);
  fS.add(params,"ao").name("Ambient occlusion").onChange(v => gtao.enabled = v);

  const fB = gui.addFolder("Building align");   // dial onto the real pillars
  fB.add(params,"bX",-9000,9000,10).name("X (mm)").onChange(applyBuilding);
  fB.add(params,"bY",-9000,9000,10).name("Y (mm)").onChange(applyBuilding);
  fB.add(params,"bZ",-5000,5000,10).name("Z (mm)").onChange(applyBuilding);
  fB.add(params,"bRot",-180,180,1).name("Rotation°").onChange(applyBuilding);
  fB.add(params,"bScale",0.2,3,0.01).name("Scale").onChange(applyBuilding);

  const L = gui.addFolder("Layers");
  for (const t of toggles) {
    layerProxy[t.name] = t.mesh.visible;
    t.ctrl = L.add(layerProxy, t.name).onChange(v => {
      t.mesh.visible = v;
      if (t.kind === "building") applyBuildingVisibility(v);   // hide/show our scaffolding to match
    });
  }

  const fI = gui.addFolder("Material specs");
  fI.add(params,"infoCNC").name("CNC").disable();
  fI.add(params,"infoWeather").name("Weather").disable();
  fI.add(params,"infoFire").name("Fire").disable();
  fI.add(params,"infoCost").name("Cost").disable();
  fI.add(params,"infoNote").name("Note").disable();
  fI.add(params,"infoProf").name("Neon").disable();

  const cam = gui.addFolder("Camera");
  cam.add({ mode:"orbit" }, "mode", ["orbit","walk"]).name("Mode (walk=FPS)").onChange(setCamMode);
  cam.add({ f:()=>{ if(home){ camera.position.set(home.tgt.x, -1400, home.tgt.z + home.s*0.55); controls.target.copy(home.tgt);} } },"f").name("Stand under");
  cam.add({ f:()=>{ if(home){ camera.position.copy(home.pos); controls.target.copy(home.tgt);} params.explode=0; layout(); updateInfo(); } },"f").name("Reset view");
}

// --- 2D layout overlay (matrix grid + columns + fixings) ---
async function addGrid() {
  const d = await fetch("ceiling.json").then(r => r.ok ? r.json() : null).catch(() => null);
  if (!d) return;
  const z = -1, cs = d.cell_mm;
  const grp = new THREE.Group(); root.add(grp);
  const seg = [];
  for (const [x,y] of d.cells) { const h=cs/2, c=[[x-h,y-h],[x+h,y-h],[x+h,y+h],[x-h,y+h]];
    for (let i=0;i<4;i++){ const a=c[i], b=c[(i+1)%4]; seg.push(a[0],a[1],z, b[0],b[1],z); } }
  const gg = new THREE.BufferGeometry(); gg.setAttribute("position", new THREE.Float32BufferAttribute(seg,3));
  grp.add(new THREE.LineSegments(gg, new THREE.LineBasicMaterial({ color:0x8a99aa })));
  for (const col of d.columns) { const cp=[]; for (let i=0;i<=64;i++){ const a=i/64*Math.PI*2; cp.push(col.c[0]+col.r*Math.cos(a), col.c[1]+col.r*Math.sin(a), z); }
    const cg=new THREE.BufferGeometry(); cg.setAttribute("position", new THREE.Float32BufferAttribute(cp,3));
    grp.add(new THREE.Line(cg, new THREE.LineBasicMaterial({ color:0x39c97a }))); }
  toggles.push({ mesh:grp, name:"matrix (existing → remove)", color:"#8a99aa", kind:"grid" });

  let minx=1e9, miny=1e9; for (const [x,y] of d.cells){ minx=Math.min(minx,x); miny=Math.min(miny,y); }
  const fix = new THREE.Group(); root.add(fix);
  for (const [x,y] of d.cells) { const ix=Math.round((x-minx)/cs), iy=Math.round((y-miny)/cs); if (ix%2||iy%2) continue;
    const fp=[]; for (let i=0;i<=20;i++){ const a=i/20*Math.PI*2; fp.push(x+45*Math.cos(a), y+45*Math.sin(a), z); }
    const fg=new THREE.BufferGeometry(); fg.setAttribute("position", new THREE.Float32BufferAttribute(fp,3));
    fix.add(new THREE.Line(fg, new THREE.LineBasicMaterial({ color:0xff7a1a }))); }
  toggles.push({ mesh:fix, name:"fixings (~1 m)", color:"#ff7a1a", kind:"grid" });
}

let bldg = null;
const bldMat = new THREE.MeshStandardMaterial({ color:0xc8ced6, roughness:0.7, metalness:0.0 });
async function addBuilding() {
  let g; try { g = await gltf.loadAsync("assets/building.glb?v=" + Date.now()); } catch(e){ return; }
  g.scene.traverse(o => { if (o.isMesh) { o.material = bldMat; o.castShadow = true; o.receiveShadow = true; } });
  bldg = new THREE.Group(); bldg.add(g.scene); root.add(bldg);     // same z-up frame as the canopy
  applyBuilding(); bldg.visible = true;                             // on by default
  const bb = new THREE.Box3().setFromObject(bldg);                  // stand the building on the floor:
  root.position.y = -bb.min.y;                                      // pillar bases -> y = 0
  FLOOR_Y = 0; floor.position.y = 0;
  toggles.push({ mesh:bldg, name:"building", color:"#3a4150", kind:"building" });
}
function applyBuildingVisibility(on) {     // building on -> hide our placeholder scaffolding
  if (!bldg) return;
  bldg.visible = on; layerProxy["building"] = on;
  for (const x of toggles) if (["host","grid","steel","column","bracket"].includes(x.kind)) { x.mesh.visible = !on; layerProxy[x.name] = !on; }
  if (gui) gui.controllersRecursive().forEach(c => c.updateDisplay());
}
function applyBuilding() {
  if (!bldg) return;
  bldg.scale.setScalar(1000 * params.bScale);   // metres -> mm (soffit at origin)
  bldg.rotation.z = params.bRot * Math.PI/180;  // in-plane yaw to match the pillars
  bldg.position.set(params.bX, params.bY, params.bZ);
}

async function loadView() {
  errEl.textContent = "";
  for (const t of toggles) { t.mesh.removeFromParent(); t.mesh.geometry?.dispose?.(); }   // clear current
  root.position.y = 0; FLOOR_Y = -3000; floor.position.y = FLOOR_Y;                        // reset ground shift
  toggles.length = 0; for (const k in layerProxy) delete layerProxy[k];
  if (gui) { gui.destroy(); gui = null; }
  const url = VIEWS[params.view] || "out/manifest.json";
  const m = await fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
  if (!m) { buildGUI(); return fail("missing " + url + " — run the matching script (figure.py / detail.py / options.py)"); }
  for (const p of m) { try { addPart(p, await loader.loadAsync("out/"+p.file)); } catch(e){ fail("load out/"+p.file+" — "+e); } }
  if (params.view === "canopy") { await addGrid(); await addBuilding(); }   // ceiling layout + real building
  buildGUI(); applyMaterial(); applyProfile(); applyMode(); layout(); fit();   // keep per-figure colours (Neon→Colour overrides all)
  if (params.view === "canopy") applyBuildingVisibility(true);   // building shown by default, scaffolding hidden
}
loadView();

addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); gtao.setSize(innerWidth,innerHeight);
});
// --- debug hooks for precise screenshots ---
window.__cam = (px,py,pz, tx=0,ty=0,tz=0) => { camera.position.set(px,py,pz); controls.target.set(tx,ty,tz); controls.update(); };
window.__walk = setCamMode;   // "walk" | "orbit"
window.__frameFigures = () => {
  const box = new THREE.Box3();
  for (const t of toggles) if (t.kind === "neon") box.expandByObject(t.mesh);
  if (box.isEmpty()) return null;
  const c = box.getCenter(new THREE.Vector3()), s = box.getSize(new THREE.Vector3()).length();
  camera.position.set(c.x, c.y - s*0.85, c.z); controls.target.copy(c);
  camera.near = s/500; camera.far = s*50; camera.updateProjectionMatrix(); controls.update();
  return { c:[c.x,c.y,c.z], size:[box.max.x-box.min.x, box.max.y-box.min.y, box.max.z-box.min.z] };
};
window.__setLayer = (name,on) => { const t=toggles.find(x=>x.name===name); if(t){ t.mesh.visible=on; if(t.ctrl){layerProxy[name]=on;t.ctrl.updateDisplay();} } };
window.__setMode = (m) => { params.mode=m; applyMode(); };
window.__probe = () => {
  const fb=new THREE.Box3(), bb=new THREE.Box3();
  for (const t of toggles){ if(t.kind==="neon") fb.expandByObject(t.mesh); if(t.kind==="building") bb.expandByObject(t.mesh); }
  const f=b=>b.isEmpty()?null:{min:[Math.round(b.min.x),Math.round(b.min.y),Math.round(b.min.z)],max:[Math.round(b.max.x),Math.round(b.max.y),Math.round(b.max.z)]};
  return { figures:f(fb), building:f(bb), seat:params.seat };
};

(function loop(){ requestAnimationFrame(loop);
  const dt = Math.min(wclock.getDelta(), 0.1);
  if (camMode === "walk") updateWalk(dt); else controls.update();
  if (params.mode==="live") composer.render(); else renderer.render(scene, camera); })();
</script>
</body>
</html>
