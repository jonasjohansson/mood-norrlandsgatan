<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon design check — People in Orbit</title>
<style>
  html,body{margin:0;height:100%;background:#0d0f13;color:#dfe6ef;overflow:hidden;
    font:13px/1.4 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;}
  #c{position:fixed;inset:0;}
  #panel{position:fixed;top:12px;right:12px;width:250px;background:rgba(18,22,30,.92);
    border:1px solid #2a3140;border-radius:9px;padding:12px 14px;backdrop-filter:blur(6px);}
  #panel h1{font-size:13px;margin:0 0 8px;letter-spacing:.02em}
  .row{display:flex;justify-content:space-between;align-items:center;margin:7px 0;gap:8px}
  .row label{color:#9fb0c4}
  input[type=range]{width:120px}
  .val{font:12px ui-monospace,monospace;color:#cfe;min-width:44px;text-align:right}
  select,button{background:#1b2230;color:#dfe6ef;border:1px solid #33404f;border-radius:6px;padding:4px 8px;font:inherit}
  button{cursor:pointer;width:100%;margin-top:6px}
  button:hover{background:#243044}
  .chk{display:flex;align-items:center;gap:6px}
  #stats{margin-top:10px;padding-top:10px;border-top:1px solid #2a3140;font:12px/1.6 ui-monospace,monospace}
  .bad{color:#ff5d6c}.warn{color:#ffb020}.ok{color:#39ff88}
  #hint{position:fixed;left:12px;bottom:12px;color:#6b7a8d;font:12px ui-monospace,monospace}
  .sw{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <h1>Neon design check</h1>
  <div class="row"><label>Profile</label>
    <select id="profile">
      <option value="6">6×12 COB (6 mm)</option>
      <option value="6">6×16 (6 mm)</option>
      <option value="10">10×23 (10 mm)</option>
      <option value="13">Round φ13 (13 mm)</option>
    </select></div>
  <div class="row"><label>Neon width</label><input id="w" type="range" min="4" max="16" step="1" value="6"><span class="val" id="wv"></span></div>
  <div class="row"><label>Min bend R</label><input id="bend" type="range" min="30" max="150" step="5" value="90"><span class="val" id="bendv"></span></div>
  <div class="row"><label>Min gap</label><input id="gap" type="range" min="0" max="30" step="1" value="4"><span class="val" id="gapv"></span></div>
  <div class="row"><span class="chk"><input type="checkbox" id="tThick" checked><label for="tThick">Real thickness</label></span>
    <span class="chk"><input type="checkbox" id="tBend" checked><label for="tBend"><span class="sw" style="background:#38d0ff"></span>cuts</label></span></div>
  <div class="row"><span class="chk"><input type="checkbox" id="tGap" checked><label for="tGap"><span class="sw" style="background:#ff5d6c"></span>too close</label></span>
    <span class="chk"><input type="checkbox" id="tCore" checked><label for="tCore">centreline</label></span></div>
  <button id="reload">↻ Reload SVG (after saving in Illustrator)</button>
  <div id="stats"></div>
</div>
<div id="hint">figures/composition.svg · scale from the two ring circles (4803 mm apart) · drag to pan · scroll to zoom</div>

<script>
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
const PILLAR_MM = 4803;                       // real distance between the two pillars/rings
let bodies = [], rings = [], mmPerPt = 1, bounds = null;
let view = { x:0, y:0, s:1 }, fitted = null;

const $ = id => document.getElementById(id);
const S = { w:6, bend:90, gap:4, thick:true, bendOn:true, gapOn:true, core:true };

function stroke(el){                              // handle stroke="" attr OR CSS-class styling (Illustrator)
    let s = el.getAttribute("stroke");
    if(!s || s==="none") s = getComputedStyle(el).stroke;
    return (!s || s==="none" || s==="rgb(0, 0, 0)") ? "#39ff88" : s;
}
async function load(){
    const txt = await fetch("figures/composition.svg?v="+Date.now()).then(r=>r.text());
    let host = document.getElementById("svghost"); if(host) host.remove();
    host = document.createElement("div"); host.id="svghost";
    host.style.cssText="position:absolute;left:0;top:0;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none";
    host.innerHTML = txt; document.body.appendChild(host);         // in-DOM so getPointAtLength + computed styles work
    const svg = host.querySelector("svg");
    rings = [...svg.querySelectorAll("circle")].map(c=>({x:+c.getAttribute("cx"),y:+c.getAttribute("cy"),r:+c.getAttribute("r")}));
    bodies = [];
    for (const p of svg.querySelectorAll("path")){                 // sample any path type natively (beziers, arcs...)
        let L=0; try { L = p.getTotalLength(); } catch(e){ continue; }
        if(!(L>0)) continue;
        const n = Math.max(2, Math.ceil(L/1.5)), pts=[];
        for(let i=0;i<=n;i++){ const q=p.getPointAtLength(L*i/n); pts.push([q.x,q.y]); }
        bodies.push({ col:stroke(p), pts });
    }
    mmPerPt = (rings.length>=2) ? PILLAR_MM/Math.hypot(rings[0].x-rings[1].x, rings[0].y-rings[1].y) : 1;
    const xs=[],ys=[]; for(const b of bodies) for(const p of b.pts){xs.push(p[0]);ys.push(p[1]);}
    bounds = { x0:Math.min(...xs), y0:Math.min(...ys), x1:Math.max(...xs), y1:Math.max(...ys) };
    fit(); analyse(); render();
}
function fit(){
    const W=cv.width, H=cv.height, m=60;
    const bw=bounds.x1-bounds.x0, bh=bounds.y1-bounds.y0;
    const s=Math.min((W-2*m)/bw,(H-2*m)/bh);
    fitted = { s, x:(W-bw*s)/2 - bounds.x0*s, y:(H-bh*s)/2 - bounds.y0*s };
    view = { ...fitted };
}
// ---- geometry checks (all thresholds in mm, geometry in pt) ----
function resample(pts, stepPt){
    const out=[pts[0]]; let acc=0;
    for(let i=1;i<pts.length;i++){ let a=out[out.length-1], b=pts[i]; let d=Math.hypot(b[0]-a[0],b[1]-a[1]);
        while(acc+d>=stepPt){ const t=(stepPt-acc)/d; const p=[a[0]+t*(b[0]-a[0]),a[1]+t*(b[1]-a[1])]; out.push(p); a=p; d=Math.hypot(b[0]-a[0],b[1]-a[1]); acc=0; }
        acc+=d; }
    return out;
}
function menger(a,b,c){
    const A=Math.abs((b[0]-a[0])*(c[1]-a[1])-(c[0]-a[0])*(b[1]-a[1]))/2;
    const d1=Math.hypot(a[0]-b[0],a[1]-b[1]),d2=Math.hypot(b[0]-c[0],b[1]-c[1]),d3=Math.hypot(a[0]-c[0],a[1]-c[1]);
    return A<1e-6 ? 1e9 : d1*d2*d3/(4*A);
}
let tightPts=[], closePts=[];
function analyse(){
    tightPts=[]; closePts=[];
    const step = 5/mmPerPt;                       // 5 mm resample
    const span = Math.max(2, Math.round(30/5));   // ±30 mm window for curvature
    const all = [];                                // {x,y,bi,ai} for spacing grid
    bodies.forEach((b,bi)=>{
        const rs = resample(b.pts, step);
        const R = rs.map((_,i)=> (i<span||i>=rs.length-span) ? 1e9 : menger(rs[i-span],rs[i],rs[i+span])*mmPerPt);
        for(let i=0;i<rs.length;){          // one marker per contiguous tight run (the sharpest point)
            if(R[i]<S.bend){ let j=i, mn=R[i], mi=i; while(j<rs.length && R[j]<S.bend){ if(R[j]<mn){mn=R[j];mi=j;} j++; } tightPts.push(rs[mi]); i=j; }
            else i++;
        }
        rs.forEach((p,ai)=>all.push({x:p[0],y:p[1],bi,ai}));
    });
    // spacing: grid hash, flag centreline points closer than (width+gap) that aren't local neighbours
    const thrPt = (S.w + S.gap)/mmPerPt;
    const cell = thrPt, grid = new Map();
    const key=(gx,gy)=>gx+","+gy;
    all.forEach((p,idx)=>{ const gx=Math.floor(p.x/cell), gy=Math.floor(p.y/cell);
        const k=key(gx,gy); (grid.get(k)||grid.set(k,[]).get(k)).push(idx); });
    const localArc = Math.ceil(thrPt/step)+2;
    const flagged = new Set();
    all.forEach((p,idx)=>{
        const gx=Math.floor(p.x/cell), gy=Math.floor(p.y/cell);
        for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
            const arr=grid.get(key(gx+dx,gy+dy)); if(!arr)continue;
            for(const j of arr){ if(j<=idx)continue; const q=all[j];
                if(p.bi===q.bi && Math.abs(p.ai-q.ai)<localArc) continue;   // skip the line vs itself locally
                if(Math.hypot(p.x-q.x,p.y-q.y)<thrPt){ flagged.add(idx); flagged.add(j); }
            }
        }
    });
    // cluster flagged points into regions (merge within one threshold)
    for(const i of flagged){ const p=[all[i].x,all[i].y];
        if(!closePts.some(m=>Math.hypot(m[0]-p[0],m[1]-p[1])<thrPt)) closePts.push(p); }
    $("stats").innerHTML =
      `<div>scale <b>${mmPerPt.toFixed(2)} mm/pt</b> · ${bodies.length} runs</div>`+
      `<div style="color:#38d0ff">● ${tightPts.length} cut points (bends &lt; ${S.bend} mm)</div>`+
      `<div class="${closePts.length?'bad':'ok'}">● ${closePts.length} spots too close (&lt; ${(S.w+S.gap)} mm)</div>`;
}
function render(){
    ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,cv.width,cv.height);
    ctx.fillStyle="#0d0f13"; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.setTransform(view.s,0,0,view.s,view.x,view.y);
    const wPt = S.w/mmPerPt;                       // real neon width in pt
    // rings
    ctx.lineWidth = Math.max(0.5/view.s, wPt); ctx.strokeStyle="rgba(230,232,238,.5)";
    for(const r of rings){ ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke(); }
    // thick neon
    if(S.thick){ ctx.lineCap="round"; ctx.lineJoin="round"; ctx.globalAlpha=0.5;
        for(const b of bodies){ ctx.strokeStyle=b.col; ctx.lineWidth=wPt;
            ctx.beginPath(); b.pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1])); ctx.stroke(); }
        ctx.globalAlpha=1; }
    // centreline
    if(S.core){ ctx.lineWidth=0.6/view.s;
        for(const b of bodies){ ctx.strokeStyle=b.col;
            ctx.beginPath(); b.pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1])); ctx.stroke(); } }
    // too-close (real collision — red)
    if(S.gapOn){ ctx.fillStyle="#ff5d6c";
        for(const p of closePts){ ctx.beginPath(); ctx.arc(p[0],p[1],Math.max(wPt*0.6,1/view.s),0,7); ctx.fill(); } }
    // tight bends = cut points (cyan)
    if(S.bendOn){ ctx.fillStyle="#38d0ff";
        for(const p of tightPts){ ctx.beginPath(); ctx.arc(p[0],p[1],Math.max(wPt*0.9,2/view.s),0,7); ctx.fill();
            ctx.strokeStyle="#fff"; ctx.lineWidth=0.5/view.s; ctx.stroke(); } }
}
// ---- interaction ----
function resize(){ cv.width=innerWidth; cv.height=innerHeight; if(bounds){ if(!fitted)fit(); render(); } }
addEventListener("resize", resize);
let drag=false, lx=0, ly=0;
cv.addEventListener("mousedown", e=>{drag=true;lx=e.clientX;ly=e.clientY;});
addEventListener("mouseup", ()=>drag=false);
addEventListener("mousemove", e=>{ if(!drag)return; view.x+=e.clientX-lx; view.y+=e.clientY-ly; lx=e.clientX; ly=e.clientY; render(); });
cv.addEventListener("wheel", e=>{ e.preventDefault(); const f=Math.exp(-e.deltaY*0.001);
    view.x = e.clientX-(e.clientX-view.x)*f; view.y = e.clientY-(e.clientY-view.y)*f; view.s*=f; render(); }, {passive:false});
function bindRange(id, key, unit){ const el=$(id), v=$(id+"v");
    const upd=()=>{ S[key]=+el.value; v.textContent=el.value+unit; analyse(); render(); }; el.addEventListener("input",upd); upd(); }
bindRange("w","w"," mm"); bindRange("bend","bend"," mm"); bindRange("gap","gap"," mm");
$("profile").addEventListener("change", e=>{ $("w").value=e.target.value; $("w").dispatchEvent(new Event("input")); });
for(const [id,key] of [["tThick","thick"],["tBend","bendOn"],["tGap","gapOn"],["tCore","core"]])
    $(id).addEventListener("change", e=>{ S[key]=e.target.checked; render(); });
$("reload").addEventListener("click", load);
resize(); load();
</script>
</body>
</html>
