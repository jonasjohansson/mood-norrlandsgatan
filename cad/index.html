<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mood Norrlandsgatan — ceiling prototype</title>
<style>
  :root { --bg:#0b0d10; --panel:#15191e; --ink:#e7eaee; --muted:#8a929c; --line:#262c34; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:13px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  #app { position:fixed; inset:0; }
  #ui { position:fixed; top:14px; left:14px; width:240px; background:var(--panel);
    border:1px solid var(--line); border-radius:12px; padding:14px; backdrop-filter:blur(8px);
    box-shadow:0 10px 30px rgba(0,0,0,.4); }
  #ui h1 { font-size:13px; margin:0 0 2px; letter-spacing:.02em; }
  #ui .sub { color:var(--muted); margin:0 0 12px; font-size:11px; }
  .row { display:flex; align-items:center; gap:8px; padding:3px 0; }
  .row label { flex:1; cursor:pointer; user-select:none; }
  .sw { width:11px; height:11px; border-radius:3px; flex:none; }
  .ctl { margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
  .ctl label { display:block; color:var(--muted); font-size:11px; margin-bottom:4px; }
  input[type=range] { width:100%; accent-color:#ff7a3c; }
  .btns { display:flex; gap:6px; margin-top:10px; }
  button { flex:1; background:#222831; color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:6px; cursor:pointer; font:inherit; }
  button:hover { border-color:#3a434e; }
  #err { position:fixed; bottom:14px; left:14px; right:14px; color:#ff8a8a;
    font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
</style>
</head>
<body>
<div id="app"></div>
<div id="ui">
  <h1>Mood — Norrlandsgatan</h1>
  <p class="sub">LED-channel ceiling prototype</p>
  <div id="parts"></div>
  <div class="ctl">
    <label>Explode <span id="expv">0</span></label>
    <input id="explode" type="range" min="0" max="400" value="0">
    <label style="margin-top:10px">Glow <span id="glowv">1.6</span></label>
    <input id="glow" type="range" min="0" max="40" value="16">
    <div class="btns">
      <button id="below">View from below</button>
      <button id="reset">Reset</button>
    </div>
  </div>
</div>
<div id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { STLLoader } from "three/addons/loaders/STLLoader.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

const errEl = document.getElementById("err");
const fail = (m) => { errEl.textContent = m; console.error(m); };

const app = document.getElementById("app");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0d10);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 20000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0x6677aa, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 1.2); key.position.set(1,2,1); scene.add(key);
const fill = new THREE.DirectionalLight(0x88aaff, 0.5); fill.position.set(-1,-1,-1); scene.add(fill);

// Z-up (build123d) -> Y-up (three)
const root = new THREE.Group();
root.rotation.x = -Math.PI/2;
scene.add(root);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.6, 0.6, 0.0);
composer.addPass(bloom);
composer.addPass(new OutputPass());

const loader = new STLLoader();
const parts = [];   // { mesh, emissive, baseZ }
let home = null;

function addPart(p, geo) {
  geo.computeVertexNormals();
  const col = new THREE.Color(p.color || "#cccccc");
  const mat = p.emissive
    ? new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 1.6, roughness:0.4 })
    : new THREE.MeshStandardMaterial({ color: col, metalness:0.6, roughness:0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(p.pos[0], p.pos[1], p.pos[2]);
  root.add(mesh);
  parts.push({ mesh, emissive: !!p.emissive, baseZ: p.pos[2], name: p.name });
  return mesh;
}

function buildUI() {
  const box = document.getElementById("parts");
  box.innerHTML = "";
  for (const pt of parts) {
    const row = document.createElement("div"); row.className = "row";
    const sw = document.createElement("span"); sw.className = "sw";
    sw.style.background = "#" + pt.mesh.material.color.getHexString();
    const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = true;
    cb.onchange = () => pt.mesh.visible = cb.checked;
    const lb = document.createElement("label"); lb.textContent = pt.name;
    lb.onclick = () => { cb.checked = !cb.checked; pt.mesh.visible = cb.checked; };
    row.append(cb, sw, lb); box.appendChild(row);
  }
}

function fit() {
  const b = new THREE.Box3().setFromObject(root);
  const c = b.getCenter(new THREE.Vector3());
  const s = b.getSize(new THREE.Vector3()).length();
  controls.target.copy(c);
  home = { pos: new THREE.Vector3(c.x, c.y + s*0.15, c.z + s*0.9), tgt: c.clone(), s };
  camera.position.copy(home.pos);
  camera.near = s/200; camera.far = s*20; camera.updateProjectionMatrix();
}

fetch("out/manifest.json")
  .then(r => r.ok ? r.json() : Promise.reject("no out/manifest.json — run: uv run python figure.py"))
  .then(async (manifest) => {
    for (const p of manifest) {
      try { addPart(p, await loader.loadAsync("out/" + p.file)); }
      catch (e) { fail("failed to load out/" + p.file + " — " + e); }
    }
    buildUI(); fit();
  })
  .catch(fail);

// --- controls ---
const $ = (id) => document.getElementById(id);
$("explode").oninput = (e) => {
  const v = +e.target.value; $("expv").textContent = v;
  for (const pt of parts) if (pt.emissive) pt.mesh.position.z = pt.baseZ - v; // neon drops out the mouth
};
$("glow").oninput = (e) => {
  const v = +e.target.value / 10; $("glowv").textContent = v.toFixed(1); bloom.strength = v;
};
$("below").onclick = () => {
  if (!home) return;
  camera.position.set(home.tgt.x, home.tgt.y - home.s*0.9, home.tgt.z + home.s*0.2);
};
$("reset").onclick = () => { if (home) camera.position.copy(home.pos); controls.target.copy(home.tgt); };

addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});

(function loop(){ requestAnimationFrame(loop); controls.update(); composer.render(); })();
</script>
</body>
</html>
